global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: producer
    metrics_path: /metrics
    static_configs:
      - targets:
          - producer:8000

  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - consumer:8010

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: containers
    static_configs:
      - targets:
          - cadvisor:8080
